name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - runtime: linux-arm64
            os: ubuntu-24.04-arm
          - runtime: linux-x64
            os: ubuntu-latest
          - runtime: win-x64
            os: windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # needed for MinVer

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install wasm-tools
        run: dotnet workload install wasm-tools

      - name: Publish self-contained binary
        shell: bash
        run: |
          dotnet publish src/MqttDashboard.WebApp/MqttDashboard.WebApp/MqttDashboard.WebApp.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o artifacts/${{ matrix.runtime }}
            
      - name: Write sample appsettings
        shell: bash
        run: |
          cat > artifacts/${{ matrix.runtime }}/appsettings.sample.json <<'EOF'
          {
            "MqttSettings": {
              "Broker": "your-mqtt-broker-host",
              "Port": 1883,
              "Username": "",
              "Password": ""
            },
            "DiagramStorage": { "DataDirectory": "./data" },
            "AllowedPathBase": "",
            "Auth": { "AdminPasswordHash": "" }
          }
          EOF

      - name: Zip artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd artifacts/${{ matrix.runtime }}
          zip -r ../../mqttdashboard-${{ matrix.runtime }}.zip .

      - name: Zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts\${{ matrix.runtime }}\*" -DestinationPath "mqttdashboard-${{ matrix.runtime }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mqttdashboard-${{ matrix.runtime }}
          path: mqttdashboard-${{ matrix.runtime }}.zip

  create-release:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

