name: CI

on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # needed for MinVer to read git tags

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore workloads
        run: dotnet workload install wasm-tools

      - name: Build
        run: dotnet build MqttDashboard.slnx -c Release

      - name: Unit and integration tests
        # Playwright E2E tests run in the separate e2e job (requires browser install).
        run: |
          dotnet test tests/MqttDashboard.Client.Tests/MqttDashboard.Client.Tests.csproj \
            -c Release --no-build --verbosity normal
          dotnet test tests/MqttDashboard.Data.Tests/MqttDashboard.Data.Tests.csproj \
            -c Release --no-build --verbosity normal
          dotnet test tests/MqttDashboard.Server.Tests/MqttDashboard.Server.Tests.csproj \
            -c Release --no-build --verbosity normal
          dotnet test tests/MqttDashboard.IntegrationTests/MqttDashboard.IntegrationTests.csproj \
            -c Release --no-build --verbosity normal

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: '**/TestResults/**'

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test        # only run if build + unit tests pass
    # E2E is informational — failures do not block merging (remove continue-on-error
    # once the suite is stable and you want it to gate PRs).
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore workloads
        run: dotnet workload install wasm-tools

      - name: Build (Playwright project)
        # Use default (Debug) configuration — dotnet run --no-build in the fixture
        # defaults to Debug, so the build and run configuration must match.
        run: dotnet build tests/MqttDashboard.PlaywrightTests/MqttDashboard.PlaywrightTests.csproj

      - name: Install Playwright browsers
        run: pwsh tests/MqttDashboard.PlaywrightTests/bin/Debug/net10.0/playwright.ps1 install chromium --with-deps

      - name: E2E tests
        run: |
          dotnet test tests/MqttDashboard.PlaywrightTests/MqttDashboard.PlaywrightTests.csproj \
            --no-build --verbosity normal

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: '**/playwright-traces/**'
